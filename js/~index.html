<!DOCTYPE html>
<html>

<head>
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Notes App</h1>

    <input
        type="text"
        id="title"
        placeholder="Enter Title"/>

    <textarea
        id="content" placeholder="Enter Content"> </textarea>

    <button id="saveBtn">
        Save Note
    </button>

    <input
        type="text"
        id="search"
        placeholder="Search Notes">

    <div id="notesList"></div>

    <script src="script.js"></script>

</body>

</html>
